<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0d0f14"/>
      <stop offset="100%" stop-color="#161a24"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="72" y="108" width="4" height="220" rx="2" fill="#6c63ff"/>

  <!-- Brand label -->
  <text x="92" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" letter-spacing="0.15em" fill="#6c63ff" text-transform="uppercase">MORTGAGE SUITE</text>

  <!-- Main headline -->
  <text x="92" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="#ffffff" letter-spacing="-0.03em">More than a calculator.</text>
  <text x="92" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="#a5b4fc" letter-spacing="-0.03em">A decision framework.</text>

  <!-- Divider line -->
  <rect x="92" y="330" width="500" height="1.5" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="92" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="rgba(255,255,255,0.55)">Post-tax · Inflation-adjusted · Behavioural quiz</text>

  <!-- Feature pills -->
  <!-- Pill 1 -->
  <rect x="92" y="420" width="192" height="44" rx="22" fill="rgba(108,99,255,0.18)" stroke="rgba(108,99,255,0.4)" stroke-width="1.5"/>
  <text x="188" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#a5b4fc" text-anchor="middle">📊 EMI Matrix</text>

  <!-- Pill 2 -->
  <rect x="298" y="420" width="216" height="44" rx="22" fill="rgba(108,99,255,0.18)" stroke="rgba(108,99,255,0.4)" stroke-width="1.5"/>
  <text x="406" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#a5b4fc" text-anchor="middle">⚙️ 3 Strategies</text>

  <!-- Pill 3 -->
  <rect x="528" y="420" width="196" height="44" rx="22" fill="rgba(108,99,255,0.18)" stroke="rgba(108,99,255,0.4)" stroke-width="1.5"/>
  <text x="626" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#a5b4fc" text-anchor="middle">🧠 Quiz</text>

  <!-- Pill 4 -->
  <rect x="738" y="420" width="220" height="44" rx="22" fill="rgba(108,99,255,0.18)" stroke="rgba(108,99,255,0.4)" stroke-width="1.5"/>
  <text x="848" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="700" fill="#a5b4fc" text-anchor="middle">🎯 Free Tool</text>

  <!-- Author attribution -->
  <text x="92" y="558" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.30)">by Shubham Kumar · shubhamrkrock.github.io</text>

  <!-- Right decorative matrix preview (abstract) -->
  <g opacity="0.18">
    <rect x="870" y="108" width="74" height="44" rx="4" fill="#4ade80"/>
    <rect x="952" y="108" width="74" height="44" rx="4" fill="#4ade80"/>
    <rect x="1034" y="108" width="74" height="44" rx="4" fill="#f59e0b"/>
    <rect x="1116" y="108" width="74" height="44" rx="4" fill="#f87171"/>

    <rect x="870" y="160" width="74" height="44" rx="4" fill="#4ade80"/>
    <rect x="952" y="160" width="74" height="44" rx="4" fill="#f59e0b"/>
    <rect x="1034" y="160" width="74" height="44" rx="4" fill="#f87171"/>
    <rect x="1116" y="160" width="74" height="44" rx="4" fill="#f87171"/>

    <rect x="870" y="212" width="74" height="44" rx="4" fill="#f59e0b"/>
    <rect x="952" y="212" width="74" height="44" rx="4" fill="#f87171"/>
    <rect x="1034" y="212" width="74" height="44" rx="4" fill="#f87171"/>
    <rect x="1116" y="212" width="74" height="44" rx="4" fill="#f87171"/>

    <rect x="870" y="264" width="74" height="44" rx="4" fill="#f87171"/>
    <rect x="952" y="264" width="74" height="44" rx="4" fill="#f87171"/>
    <rect x="1034" y="264" width="74" height="44" rx="4" fill="#f87171"/>
    <rect x="1116" y="264" width="74" height="44" rx="4" fill="#f87171"/>
